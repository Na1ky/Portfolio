<div class="skills-ticker-wrapper" *ngIf="technologies && technologies.length > 0">
  <div class="skills-ticker-container" 
       #tickerContainer 
       (mouseenter)="onMouseEnter()" 
       (mouseleave)="onMouseLeave()"
       (wheel)="onWheel($event)"
       (mousedown)="onMouseDown($event)"
       (mouseup)="onMouseUp()"
       (mousemove)="onMouseMove($event)">
    <div class="skills-ticker-track" #track>
      <!-- Original list -->
      <div class="skill-item" *ngFor="let tech of technologies">
        <img [src]="tech.icon_url" [alt]="tech.name" class="skill-icon" loading="lazy" draggable="false">
        <span class="skill-name">{{ tech.name }}</span>
      </div>
      <!-- Duplicated list for infinite scrolling -->
      <div class="skill-item" *ngFor="let tech of technologies" aria-hidden="true">
        <img [src]="tech.icon_url" [alt]="tech.name" class="skill-icon" loading="lazy" draggable="false">
        <span class="skill-name">{{ tech.name }}</span>
      </div>
    </div>
  </div>
</div>
