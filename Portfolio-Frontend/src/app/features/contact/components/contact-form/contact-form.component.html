<div class="glass-card p-5 p-lg-6 h-100">
  <form id="contactForm" (ngSubmit)="sendEmail()" #contactForm="ngForm" novalidate>
    <div class="col-md-6 mb-3">
      <label class="form-label mb-2">{{ 'CONTACT.FORM.FULL_NAME' | translate }}</label>
      <input type="text" name="fullName" [(ngModel)]="formData.fullName" class="form-control form-dark"
        [placeholder]="'CONTACT.FORM.FULL_NAME_PLACEHOLDER' | translate" required>
    </div>

    <div class="col-md-6 mb-3">
      <label class="form-label mb-2">{{ 'CONTACT.FORM.EMAIL' | translate }}</label>
      <input type="email" name="email" [(ngModel)]="formData.email" class="form-control form-dark"
        [placeholder]="'CONTACT.FORM.EMAIL_PLACEHOLDER' | translate" required email #emailField="ngModel"
        [class.is-invalid]="emailField.invalid && (emailField.touched || contactForm.submitted)">
      @if (emailField.invalid && (emailField.touched || contactForm.submitted)) {
      <small class="text-danger d-block mt-2">{{ 'CONTACT.MESSAGES.INVALID_EMAIL' | translate }}</small>
      }
    </div>

    <div class="mb-4">
      <label class="form-label mb-2">{{ 'CONTACT.FORM.SUBJECT' | translate }}</label>
      <input type="text" name="subject" [(ngModel)]="formData.subject" class="form-control form-dark"
        [placeholder]="'CONTACT.FORM.SUBJECT_PLACEHOLDER' | translate" required>
    </div>

    <div class="mb-5">
      <label class="form-label mb-2">{{ 'CONTACT.FORM.MESSAGE' | translate }}</label>
      <textarea name="message" [(ngModel)]="formData.message" class="form-control form-dark" rows="6"
        [placeholder]="'CONTACT.FORM.MESSAGE_PLACEHOLDER' | translate" required></textarea>
    </div>

    <input type="hidden" name="botField" [(ngModel)]="formData.botField">

    <button type="submit" class="btn btn-gradient w-100 py-3" [disabled]="sending || contactForm.invalid">
      @if (!sending) {
      <span>{{ 'CONTACT.FORM.SEND' | translate }}</span>
      } @else {
      <span>{{ 'CONTACT.FORM.SENDING' | translate }}</span>
      }
    </button>

    @if (resultMessage) {
    <div class="mt-3">
      <small [ngClass]="{
          'message-success': resultSuccess,
          'message-error': !resultSuccess
        }" class="message-dark">
        {{ resultMessage }}
      </small>
    </div>
    }
  </form>
</div>
