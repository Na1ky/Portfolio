<!-- NavbarComponent -->
<nav class="navbar navbar-expand-lg navbar-dark custom-navbar">
  <div class="navbar-inner">

    <!-- LOGO -->
    <a class="navbar-brand" [routerLink]="['/']">Dominici Nicolas</a>

    <!-- BURGER MOBILE -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
      aria-controls="navbarNav" aria-expanded="false" aria-label="Apri menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- COLLAPSE -->
    <div class="collapse navbar-collapse" id="navbarNav">

      <!-- LINKS - centrati in assoluto -->
      <ul class="navbar-nav nav-center mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" [routerLink]="['/']" fragment="about">{{ 'NAVBAR.ABOUT' | translate }}</a></li>
        <li class="nav-item"><a class="nav-link" [routerLink]="['/portfolio']">{{ 'NAVBAR.PORTFOLIO' | translate }}</a></li>
        <li class="nav-item"><a class="nav-link" [routerLink]="['/contact']">{{ 'NAVBAR.CONTACT' | translate }}</a></li>
      </ul>

      <!-- LANG SWITCHER - fisso a destra -->
      <div class="language-switcher">
        <button [class.lang-active]="currentLang === 'it'" (click)="switchLanguage('it')">IT</button>
        <span class="lang-sep">|</span>
        <button [class.lang-active]="currentLang === 'en'" (click)="switchLanguage('en')">EN</button>
      </div>

    </div>
  </div>
</nav>
